name: Build XLSX from JSON

on:
  push:
    branches: [ "main" ]
    paths:
      - "data/torre_base.json"
      - "scripts/build_xlsx_from_json.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-xlsx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Generate XLSX
        run: python scripts/build_xlsx_from_json.py

      - name: Commit XLSX if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Torre de Expsansão.xlsx"
          git diff --cached --quiet && exit 0
          git commit -m "chore: regenerar XLSX a partir do JSON"
          git push
